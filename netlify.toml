# Netlify deployment configuration for Follow Korea
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: serve index.html for any unmatched path
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 보안 헤더 (클릭재킹/MIME 스니핑/레퍼러 정책)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
